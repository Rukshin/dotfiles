# ══════════════════════════════════════════════════════════
# PREFIX
# ══════════════════════════════════════════════════════════
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ══════════════════════════════════════════════════════════
# TERMINAL / COLORS
# ══════════════════════════════════════════════════════════
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:hyperlinks"
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -sg escape-time 10

# ══════════════════════════════════════════════════════════
# GENERAL
# ══════════════════════════════════════════════════════════
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top
set -g focus-events on

# ══════════════════════════════════════════════════════════
# VI MODE + CLIPBOARD
# ══════════════════════════════════════════════════════════
set -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# ══════════════════════════════════════════════════════════
# SPLITS — inherit current directory
# ══════════════════════════════════════════════════════════
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ══════════════════════════════════════════════════════════
# PANE NAVIGATION (vim-style)
# ══════════════════════════════════════════════════════════
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ══════════════════════════════════════════════════════════
# PANE RESIZE
# ══════════════════════════════════════════════════════════
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ══════════════════════════════════════════════════════════
# FLOATING SCRATCH SESSION (Alt+g)
# ══════════════════════════════════════════════════════════
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}

# ══════════════════════════════════════════════════════════
# SESSION MANAGEMENT
# ══════════════════════════════════════════════════════════
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# ══════════════════════════════════════════════════════════
# PLUGINS (TPM)
# ══════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'Nybkox/tmux-kanagawa'

# ══════════════════════════════════════════════════════════
# KANAGAWA THEME
# ══════════════════════════════════════════════════════════
set -g @kanagawa-theme 'dragon'
set -g @kanagawa-plugins "git cpu-usage ram-usage"
set -g @kanagawa-ignore-window-colors true
set -g @kanagawa-show-powerline true
set -g @kanagawa-show-left-icon session

# ══════════════════════════════════════════════════════════
# TPM INIT — must be last line
# ══════════════════════════════════════════════════════════
run '~/.tmux/plugins/tpm/tpm'
